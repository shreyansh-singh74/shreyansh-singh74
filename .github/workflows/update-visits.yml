name: Update Visits

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch:

jobs:
  update-visits:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Increment visits count
        id: increment
        run: |
          if [ ! -f visits.txt ]; then echo "0" > visits.txt; fi
          visits=$(cat visits.txt)
          visits=$((visits + 1))
          echo $visits > visits.txt
          echo "visits=$visits" >> $GITHUB_OUTPUT

      - name: Update README.md
        run: |
          visits=${{ steps.increment.outputs.visits }}
          
          # Format the number with k for thousands in a structured manner
          if [ $visits -ge 1000000 ]; then
            # For millions (1M+)
            formatted_visits=$(python3 -c "
import math
visits = $visits
if visits >= 1000000:
    result = visits / 1000000
    if result == int(result):
        print(f'{int(result)}M')
    else:
        print(f'{result:.1f}M')
")
          elif [ $visits -ge 1000 ]; then
            # For thousands (1K+)
            formatted_visits=$(python3 -c "
visits = $visits
result = visits / 1000.0
# For values like 1011, we want to show 1.0k, not 1k
formatted_result = f'{result:.1f}'
# Remove trailing zero only if it's a whole number greater than single digit
if formatted_result.endswith('.0') and result >= 2.0:
    print(f'{int(result)}k')
else:
    print(f'{formatted_result}k')
")
          else
            # For numbers less than 1000
            formatted_visits=$visits
          fi
          
          echo "Raw visits: $visits"
          echo "Formatted visits: $formatted_visits"
          
          # Create the new badge with formatted number
          new_badge="<img src=\"https://img.shields.io/badge/Views-${formatted_visits}-8B5CF6?style=flat-square&logo=eye&logoColor=white&labelColor=6B7280\" alt=\"Profile Views\"/>"
          
          # Use perl for safe replacement (more reliable than sed)
          perl -i -pe "s|<img src=\"https://img\.shields\.io/badge/Views-[^-]*-8B5CF6[^\"]*\" alt=\"Profile Views\"/>|$new_badge|g" README.md
          
          echo "Updated badge to show $formatted_visits visits"

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add visits.txt README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔢 Update visits count: ${{ steps.increment.outputs.visits }}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}