name: Update Visits

permissions:
  contents: write

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */12 * * *'  # Every 12 hours
  workflow_dispatch:

jobs:
  update-visits:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Increment visits count
        id: increment
        run: |
          if [ ! -f visits.txt ]; then echo "0" > visits.txt; fi
          visits=$(cat visits.txt)
          visits=$((visits + 1))
          echo $visits > visits.txt
          echo "visits=$visits" >> $GITHUB_OUTPUT

      - name: Update README.md
        run: |
          visits=${{ steps.increment.outputs.visits }}
          
          # Use Python for safe string replacement
          python3 << 'EOF'
import re

# Read the README file
with open('README.md', 'r', encoding='utf-8') as f:
    content = f.read()

# Pattern to match the views badge (more specific)
pattern = r'<img src="https://img\.shields\.io/badge/Views-\d+-8B5CF6\?style=flat-square&logo=eye&logoColor=white&labelColor=6B7280" alt="Profile Views"/>'

# New badge
visits = "${{ steps.increment.outputs.visits }}"
new_badge = f'<img src="https://img.shields.io/badge/Views-{visits}-8B5CF6?style=flat-square&logo=eye&logoColor=white&labelColor=6B7280" alt="Profile Views"/>'

# Replace the badge
new_content = re.sub(pattern, new_badge, content)

# Write back to file
with open('README.md', 'w', encoding='utf-8') as f:
    f.write(new_content)

print(f"Updated badge to show {visits} visits")
EOF

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add visits.txt README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🔢 Update visits count: ${{ steps.increment.outputs.visits }}"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}