name: Update Visits

permissions:
  contents: write

on:
  push:
    branches:
      - main
  schedule:
    - cron: "*/15 * * * *"

jobs:
  update-visits:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Increment visit counter
        id: increment
        run: |
          if [ ! -f visits.txt ]; then echo "0" > visits.txt; fi
          visits=$(cat visits.txt)
          visits=$((visits + 1))
          echo $visits > visits.txt
          echo "visits=$visits" >> $GITHUB_OUTPUT

      - name: Debug - Show visits and badge
        run: |
          echo "Views: ${{ steps.increment.outputs.visits }}"
          echo "Badge: <img src=\"https://img.shields.io/badge/Views-${{ steps.increment.outputs.visits }}-8B5CF6?style=flat-square&logo=eye&logoColor=white&labelColor=6B7280\" alt=\"Profile Views\"/>"

      - name: Update README.md
        run: |
          visits=${{ steps.increment.outputs.visits }}
          badge="<img src=\"https://img.shields.io/badge/Views-${visits}-8B5CF6?style=flat-square&logo=eye&logoColor=white&labelColor=6B7280\" alt=\"Profile Views\"/>"
          sed -i.bak 's|<img src="https://img.shields.io/badge/Views-[0-9]*-8B5CF6[^"]*" alt="Profile Views"/>|'"$badge"'|' README.md

      - name: Set up authentication
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          git add visits.txt README.md
          git commit -m 'Update visits count' || echo "No changes to commit"
          git push
        env:
          GIT_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }} 

          